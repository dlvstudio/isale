<ion-header>
    <ion-toolbar>
        <ion-buttons slot='start'>
            <ion-button (click)="dismiss()">
                <ion-icon name="close"></ion-icon>
                &nbsp;{{'common.cancel' | translate}}
            </ion-button>
        </ion-buttons>
        <ion-title>
            {{'point.search-level' | translate}}
        </ion-title>
        <ion-buttons slot='end'>
            <ion-button (click)='openAdd()'>
                <ion-icon name="add"></ion-icon>
            </ion-button>
        </ion-buttons>
    </ion-toolbar>
</ion-header>

<ion-content [style]="navCtrl.hasAds() ? '--padding-bottom: 60px' : ''">
    <ion-searchbar debounce="700" (ionClear)='clearSearch()' (ionChange)='search()' [(ngModel)]='searchKey'></ion-searchbar>
    <ion-list>
        <ion-item *ngFor="let item of items">
            <ion-label (click)='select(item)'>
                <h2 *ngIf='item.title'>{{'point-add.level-title' | translate}}: {{item.title}}</h2>
                <p *ngIf='item.point'>{{'point-add.level-point' | translate}}: {{item.point}} {{'point-add.point' | translate}}
                </p>
                <p *ngIf='item.buyCount'>{{'point-add.level-buy-count' | translate}}: {{item.paymentAfterBuyCount}}</p>
            </ion-label>
            <ion-buttons slot="end">
                <ion-button (click)='edit(item)'>
                    <ion-icon name="pencil" slot="icon-only"></ion-icon>
                </ion-button>
            </ion-buttons>
        </ion-item>
        <ion-item class='ion-text-wrap' *ngIf="!originalItems || originalItems.length===0">
            <div [innerHTML]="'point-add.no-level-config' | translate">
            </div>
        </ion-item>
    </ion-list>
</ion-content>
